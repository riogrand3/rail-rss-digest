name: Rail RSS Intelligence Report

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run with only 5 articles"
        required: false
        type: boolean
        default: true
      dry_run:
        description: "Generate report but do not send email"
        required: false
        type: boolean
        default: true
      days:
        description: "Number of days to look back"
        required: false
        type: string
        default: "4"

  schedule:
    - cron: "0 7 * * 0,3"
      timezone: "Europe/Madrid"

jobs:
  generate-rail-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run rail RSS report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          DAYS="${{ inputs.days }}"
          if [ -z "$DAYS" ]; then
            DAYS="4"
          fi

          COMMAND="uv run python src/main.py --days $DAYS --verbose"

          if [ "${{ inputs.test_mode }}" = "true" ]; then
            COMMAND="$COMMAND --test"
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            COMMAND="$COMMAND --dry-run"
          fi

          echo "Running: $COMMAND"
          $COMMAND

      - name: Upload generated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rail-rss-report
          path: |
            digest_*.html
            digest.log
          retention-days: 30
